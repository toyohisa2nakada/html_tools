<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<title>html mergely (diff)</title>

	<!--
		mergelyのドキュメント
		https://www.mergely.com/doc
		cssファイルの内容をjavascriptで変更するため、CDNからダウンロードしたものをlibsフォルダ以下に保存して使用する。
		最新の5.3.6では、mode:pythonが指定できない。よって5.1.1を使用する。
		ファイルは、cdnからダウンロードして使用している。
		5.1.1のmergely.min.jsはconsole.logが残っているので、そこはコメントアウトした。
	-->
	<script src="libs/mergely5.1.1/mergely.min.js"></script>
	<link rel="stylesheet" href="libs/mergely5.1.1/mergely.css" />

	<!--
		html to canvas
		https://github.com/niklasvh/html2canvas

		html文字を画像化する方法には決定的なものが無い。
		上記のhtml2canvas以外に試したものは、https://github.com/bubkoo/html-to-image である。
		このhtml-to-imageは、表示を繰り返す？画面上部の文字がなぜか画面下部にもう一度表示されるなどの
		問題点があり、使用を断念した。
	-->
	<script src="./libs/html2canvas.js"></script>

	<!--
		画像をポップアップで表示するライブラリ
		jqueryが必要なので、jquery付きのcdnを使用する。
	-->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.5/js/lightbox-plus-jquery.min.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.5/css/lightbox.min.css" />

	<!--
		きれいなポップアップを表示するライブラリ
		https://sweetalert2.github.io/
	-->
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<!--
		dropdownlistにチェックボックスを付けるために、
		ポップアップでそれっぽく作る
  -->
	<link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
	<script src="https://unpkg.com/@popperjs/core@2"></script>
	<script src="https://unpkg.com/tippy.js@6"></script>


	<!--
		音を鳴らす
  -->
	<script src="./libs/sound.js"></script>


	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html,
		body,
		.app {
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			background-color: #f5f5f5;
		}

		.header {
			height: 28px;
			margin: 4px;
			display: flex;
			align-items: center;
		}

		.content {
			width: 100%;
			height: 100%;
			flex: 0 1 auto;
			overflow: auto;
		}

		#footer {
			display: flex;
			height: 30vh;
			transition: height 0.5s ease;
			flex-shrink: 0;
			position: relative;
			margin: 4px;
			background-color: #fff;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1), 0 2px 4px rgba(0, 0, 0, 0.2);
			border-radius: 10px 10px 0 0;
		}

		.footer_button_panel {
			position: absolute;
			top: 0;
			right: 0;
			display: flex;
		}

		.icon-button {
			border: none;
			background: none;
			padding: 2px 0px;
			font-size: 20px;
			cursor: pointer;
		}

		#mergely {
			height: 100%;
		}

		/* mergelyの行番号のところに表示されるマージボタンを非表示にする */
		.merge-button {
			display: none;
		}

		.header_panel {
			margin: 0px 2px;
		}

		label[for="download_filename"],
		label[for="kadai_filename"],
		label[for="kadai_quest"] {
			font-size: 8px;
		}

		#download_filename,
		#kadai_filename,
		#kadai_quest {
			width: 60px;
		}

		#kadai_status_panel {
			margin-left: auto;
			font-size: 10px;
		}

		#kadai_status_panel>span:not(.no-style) {
			background-color: #dddddd;
			color: #f0f0f0;
			margin-left: 2px;
			padding: 0 3px;
		}

		#kadai_status_panel>span.finished {
			color: #7F57D3;
		}

		#download_button_panel {
			margin-left: auto;
			display: inline-flex;
			align-items: baseline;
		}

		#create_encoded_html_panel {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			padding: 10px 20px;
			font-size: 16px;
			display: none;
		}

		#create_encoded_html {
			background-color: #4CAF50;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			padding: 10px;
			margin: 10px;
		}

		#plane_html_file {
			display: none;
		}

		#editor_output {
			width: 100%;
			height: 100%;
			border: none;
			display: block;
		}

		.button {
			background-color: #5C7080;
			border: 1px solid #4A5A67;
			color: #F0F0F0;
			padding: 2px 6px;
			margin-left: 1px;
			text-align: center;
			border-radius: 6px;
			cursor: pointer;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
			transition: background-color 0.3s, box-shadow 0.3s;
		}

		.button:hover {
			background-color: #4A5A67;
			box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
		}

		input[type="checkbox"] {
			accent-color: #5C7080;
		}

		/* javascript演習のhtmlでプレビューが動作しないことがあるのでカット */
		#final_preview_button {
			display: none !important;
		}
	</style>
</head>

<body>
	<div class="app">
		<div class="header">
			<div class="kadai_filename_panel">
				<label for="kadai_filename">課題</label>
				<select id="kadai_filename">
					<option></option>
				</select>
			</div>
			<div class="kadai_quest_panel">
				<label for="kadai_quest">改造要求</label>
				<select id="kadai_quest">
				</select>
			</div>

			<button id="menu-btn">設定</button>
			<div id="menu-content" style="display:none;">
				<span id="key_sounds_panel" class="header_panel">
					<label for="key_sounds">タイプ音</label>
					<select id="key_sounds">
						<option value=""></option>
						<option value="default" selected>タイプライター</option>
						<option value="peen">ピーン</option>
						<option value="punch">パンチ</option>
						<option value="kok">コッ</option>
						<option value="hyu">ヒュッ</option>
						<option value="slash">斬る</option>
						<option value="temple_bell">鐘</option>
						<option value="taiko">太鼓</option>
						<option value="hit">打撃</option>
						<option value="wooden_clappers">拍子木</option>
						<option value="by_key">キーに応じて変化する</option>
					</select>
				</span>
			</div>

			<span id="instruction_panel" class="header_panel">
				<button id="instruction" class="icon-button">ℹ️</button>
			</span>
			<span id="kadai_status_panel" class="header_panel">
				<span class="no-style">✔️</span>
			</span>
			<span id="autoupdate_panel" class="header_panel">
				<label><input type="checkbox" id="autoupdate">差分</label>
			</span>
			<span id="download_button_panel" class="header_panel">
				<label for="download_filename">ダウンロードファイルの名前</label>
				<input type="text" placeholder="" id="download_filename">
				<button id="download_button" class="button">download</button>
			</span>
		</div>
		<div class="content">
			<div id="mergely"></div>
		</div>
		<div id="footer">
			<div class="footer_button_panel">
				<div id="footer_button_panel_module">
				</div>
				<div>
					<button id="submit_to_screen" class="button">スクリーンに送る</button>
					<button id="footer-toggle" title="縮小" class="icon-button">🔽</button>
				</div>
			</div>
			<iframe id="editor_output"></iframe>
		</div>
		<a id="lightbox2_popup" href="" data-lightbox="image-1"
			data-title="完成版のプレビューでは、少し表示が崩れることがありますが、課題ではだいたい見た目が合っていれば問題ありません。自分で書いたHTMLは画面の下にプレビューされます。"
			style="visibility: hidden; position: absolute;"></a>
	</div>
	<div id="create_encoded_html_panel">
		<button id="create_encoded_html">エンコードするHTMLファイルを選択してください</button>
		<input type="file" id="plane_html_file" multiple>
		<button id="return_from_create_encoded_html_to_normal">元に戻る</button>
		<textarea id="encoded_html" rows="40" cols="100"></textarea>
	</div>

		// html parameter
		const html_params = [...new URLSearchParams(location.search).entries()].reduce((obj, e) => ({ ...obj, [e[0]]: e[1] }), {});

		// scriptタグで読み込むscriptファイルの動的読み込み
		const load_script = function (fname) {
			return new Promise((resolve, reject) => {
				const sc = document.createElement("script");
				sc.type = "text/javascript";
				sc.src = fname;
				sc.onload = () => resolve();
				sc.onerror = (e) => reject(e);
				const s = document.getElementsByTagName("script")[0];
				s.parentNode.insertBefore(sc, s);
			});

		if (python !== undefined) {
			const editor_output_elem = document.getElementById("editor_output");
			editor_output_elem.setAttribute('sandbox', 'allow-scripts allow-same-origin');
			python.init({

					code: mergely.cm("rhs").getValue(),

				},
				get_mergely: () => mergely,
			});
			const style_elem = document.querySelector("style");

		  #${e} { display: none !important; }

			});

		}

		// html server
		const html_server_client = undefined;
		// import { html_server_client } from "./libs/html_server_client.mjs";
		if (html_server_client !== undefined && html_server_client.is_avaiable()) {
			console.log("html_server_client avaiable");

			await load_script("https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js");
			await html_server_client.init();
			document.getElementById("footer_button_panel_module").appendChild([
				document.createElement("button"),
				e => e.textContent = "📲",
				e => e.classList.add("icon-button"),
				e => e.addEventListener("click", async e => {
					const code = mergely.cm("rhs").getValue().trim();
					if (code.length === 0) {
						alert("プログラムを書いてから、QRコードを表示してみてください。");
						return;
					}
					const { uuid } = await html_server_client.create_html(code);

					const element = document.createElement("canvas");
					// await Swal.fire("それぞれの課題は、<span style='color:blue'>2つのファイル</span>で構成されています。");
					const qr = new QRious({
						element,
						value: `https://www.pecode.com/html_server?uuid=${uuid}`,
					});
					await Swal.fire({
						title: "smartphone",
						html: element,
						showConfirmButton: true,
					});
					element.remove();
				})

		const mergely_user_params = {
			background: {
				undefined: "#ffffff",
				"py": "#ffffff",
				"html": "#ffffff",
				"txt": "#f0f8ff",
			},
			autoupdate: undefined,
		};
		const update_mergely_user_setting = (filename) => {
			const file_ext = filename.match(/\.([^.]+)$/)?.[1];
			mergely.cm("lhs").getWrapperElement().style.background =
				mergely_user_params.background[file_ext];

			if (file_ext === "txt" && autoupdate_elem.checked) {
				setTimeout(() => {
					autoupdate_elem.checked = false;
					update_autoupdate();
				}, 500);
			} else if ((file_ext === "py" || file_ext === "html") && mergely_user_params.autoupdate !== autoupdate_elem.checked) {
				setTimeout(() => {
					autoupdate_elem.checked = mergely_user_params.autoupdate;
					update_autoupdate();
				}, 500);
			}
		}


		// create_encoded_html
		if (html_params.create_encoded_html) {
			document.getElementById("create_encoded_html_panel").style.display = "block";
			const plane_html_file = document.getElementById("plane_html_file");
			plane_html_file.addEventListener("change", async e => {
				if (plane_html_file.files[0] === undefined) {
					return;
				}
				const encoded_html_elem = document.getElementById("encoded_html");
				if (python !== undefined) {
					python.create_encoded_code(plane_html_file.files, encoded_html_elem)
				} else {
					const ps = Array.from(plane_html_file.files).sort((f0, f1) => f0.name.localeCompare(f1.name)).map(file => {
						return new Promise((resolve, reject) => {
							const reader = new FileReader();
							reader.onload = e => {
								const encoded = btoa(unescape(encodeURIComponent(e.target.result)));
								resolve(`"${file.name}":"${encoded}"`);
							}
							reader.onerror = reject;
							reader.readAsText(file);
						})
					})

					const results = await Promise.all(ps);
					encoded_html_elem.value = results.join(",\n");
				}
			})
			document.getElementById("create_encoded_html").addEventListener("click", e => {
				document.getElementById("plane_html_file").click();
			});
			document.getElementById("return_from_create_encoded_html_to_normal").addEventListener("click", e => {
				const p = { ...html_params };
				delete p.create_encoded_html;
				const ps = new URLSearchParams(p).toString();
				location.href = ps.length === 0 ? location.pathname : location.pathname + "?" + ps;
			});
		}

		// Mergelyの生成
		const mergely = new Mergely('#mergely', {
			license: "lgpl-separate-notice",
			lhs: '',
			lhs_cmsettings: {
				readOnly: true,
				tabSize: 2,
				indentUnit: 2,
				indentWithTabs: false,
				smartIndent: false,
				tabMode: "spaces",
				mode: python === undefined ? "htmlmixed" : "python",
			},
			rhs: '',
			rhs_cmsettings: {

				indentUnit: 2,
				indentWithTabs: false,
				smartIndent: false,
				tabMode: "spaces",
				extraKeys: {

		// 左右スクロールの同期解除
		mergely.cm("lhs").scrollTo = () => { };
		mergely.cm("rhs").scrollTo = () => { };

		// 左側のコードのコピー禁止
		const nocopy_dom = document.getElementsByClassName("CodeMirror")[0];
		nocopy_dom.addEventListener("copy", e => {

		// 右側のエディタの変更箇所のエフェクト変更（デフォルトは青文字）
		const css_sheet = Array.from(document.styleSheets).filter(e => e.href?.includes("mergely.css"))[0];
		const rule = Array.from(css_sheet.cssRules).filter(rule => rule.selectorText === '.mergely-editor .mergely.ch.ina.rhs')[0];
		rule.style.color = "#ff0000";
		rule.style.textDecoration = 'line-through';

		// エディタの内容更新
		// editor update timer
		const timer = (function (cb, msec) {
			let timer_id = undefined;
			return {
				set: function () {
					clearTimeout(timer_id);
					timer_id = setTimeout(cb, msec);
				},
			}
		})(() => {
			const txt = mergely.cm("rhs").getValue();
			const kadai_filename = document.getElementById("kadai_filename").selectedOptions[0].text;
			if (kadai_filename.length > 0) {
				localStorage.setItem(kadai_filename, txt);
			}

			if (python === undefined) {
				document.getElementById("editor_output").srcdoc = txt;
			} else {
				python.update(txt);
			}

			if (/localStorage.clear/.test(txt)) {
				if (confirm("保存されたコードをすべて削除します。よろしいですか？")) {
					localStorage.clear();
				}
			}
			if (/create_encoded_html/.test(txt)) {
				if (confirm("create encoded htmlモードに遷移します。よろしいですか？")) {
					const p = new URLSearchParams({ ...html_params, "create_encoded_html": 1 });
					location.href = `${location.pathname}?${p.toString()}`;
				}
			}

			if (/(?:ねこ|猫|ネコ)おやすみ/.test(txt)) {
				cursor_icon?.set_visibility("visible");
				cursor_icon?.set_state("sleeping");
			} else if (/(?:ねこ|猫|ネコ)おいで/.test(txt)) {
				cursor_icon?.set_visibility("visible");
				cursor_icon?.set_pos(mergely.cm("rhs"));
				cursor_icon?.set_state("walking");
			} else {
				cursor_icon?.set_pos();
				cursor_icon?.set_visibility("hidden");
			}
		}, 1000);
		mergely.cm("rhs").on("change", () => {
			timer.set();
		});

		const key_sounds_elem = document.getElementById("key_sounds");
		mergely.cm("rhs").on("keydown", (instance, e) => {
			// console.log(e);

			const specialKeysToExclude = [
				'F1', 'F2', 'F3', 'F4', 'F5', 'F6', 'F7', 'F8', 'F9', 'F10', 'F11', 'F12',
				'Alt', 'Control', 'Shift', 'Meta', // これらは修飾キー単独の押下
				'CapsLock', 'Tab', 'Escape',
				'PageUp', 'PageDown', 'End', 'Home', 'Insert',
				'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight' // ★矢印キーを追加★
				// 'Enter', // Enterキーも除外したい場合は追加
				// 'Backspace', 'Delete' // 削除系キーも除外したい場合は追加
			];
			// 1. 修飾キー単独での押下をチェック (Ctrl, Shift, Alt, Meta)
			// これらのキーが単独で押された場合は、通常文字入力には繋がりません
			if (e.key === 'Control' || e.key === 'Shift' || e.key === 'Alt' || e.key === 'Meta') {
				return; // 単独の修飾キーは無視
			}
			// 2. 特殊キーのリストに含まれるキーを除外
			if (specialKeysToExclude.includes(e.key)) {
				// console.log(`除外された特殊キーが押されました: ${e.key}`);
				return; // リスト内の特殊キーは無視
			}
			// 3. 修飾キー（Ctrl, Shift, Alt, Meta）が押されている場合は、文字キーであっても無視する
			// 例: Ctrl+A (全選択) は文字入力ではない
			// ただし、Alt+数字（特殊文字入力など）やShift+文字（大文字入力）は除外しない場合もあるので、
			// 要件に応じて調整してください。ここではシンプルに「単独の文字入力」を想定します。
			if (e.ctrlKey || e.altKey || e.metaKey) {
				// Shiftキーは単独の文字キーと組み合わせて大文字入力になるので、ここでは除外しない
				// (e.g., Shift + 'a' -> 'A')
				return;
			}

			// タイプ音を鳴らす。
			if (key_sounds_elem.value.length !== 0) {
				sound.play({ type: key_sounds_elem.value, key: e.key });
			}
		});

		// カーソルを追いかけるアイコン
		import { ImageIcon } from "./libs/ImageIcon.mjs";
		const ipr = document.querySelectorAll(".CodeMirror-wrap")[1].getBoundingClientRect();
		const cursor_icon = ImageIcon.create({ pos: { left: ipr.right - 40, top: ipr.top + 40 }, visibility: "hidden" });
		// const cursor_icon = undefined;

		// diffの自動更新機能の有効/無効化
		const autoupdate_elem = document.getElementById("autoupdate");
		autoupdate_elem.checked = mergely_params.autoupdate;
		mergely_user_params.autoupdate = autoupdate_elem.checked;
		const update_autoupdate = () => {
			mergely.options({ autoupdate: autoupdate_elem.checked });
			mergely.lhs(mergely.get("lhs"));
			mergely.rhs(mergely.get("rhs"));
		}
		autoupdate_elem.addEventListener("change", e => {
			mergely_user_params.autoupdate = autoupdate_elem.checked;
			update_autoupdate();
		});

		// プレビューボタンの表示
		const set_preview_button_visible = (function () {
			let final_preview_button_elem = undefined;
			return (visible) => {
				if (visible === false) {
					final_preview_button_elem && (final_preview_button_elem.style.display = "none");
					return;
				}
				if (final_preview_button_elem !== undefined) {
					final_preview_button_elem.style.display = "block";
					return;
				}
				const parent = document.querySelectorAll(".CodeMirror-wrap")[0];
				final_preview_button_elem = parent.appendChild([
					document.createElement("button"),
					e => e.id = "final_preview_button",
					e => e.classList.add("button"),
					e => e.textContent = "完成プレビュー",
					e => e.style.position = "absolute",
					e => e.style.top = "10px",
					e => e.style.right = "20px",
					e => e.addEventListener("click", async e => {
						if (mergely.cm("lhs").getValue() === "") {
							alert("課題を選択してください。")
							return;
						}
						await preview(mergely.cm("lhs").getValue())
					}),
				].a2e());
			};
		})();

		// 課題HTMLの文字の読み込み
		const kadai_filename_elem = document.getElementById("kadai_filename");
		Object.entries(kadais).forEach(([filename, encoded_html], i) => {
			kadai_filename_elem.appendChild([
				document.createElement("option"),
				e => e.value = encoded_html,
				e => e.textContent = filename,
			].a2e());
			document.getElementById("kadai_status_panel").appendChild([
				document.createElement("span"),
				e => e.textContent = (i + 1),
				e => e.id = `kadai_status_${filename}`,
			].a2e());
		});

		// 課題ファイルが選択されたら
		kadai_filename_elem.addEventListener("change", e => {
			// クエストのselect要素を取得
			const kadai_quest_elem = document.querySelector("#kadai_quest");
			// クエストのselectを空にする
			kadai_quest_elem.innerHTML = "<option></option>";
			// 課題ファイルの選択が解除されたとき
			if (kadai_filename_elem.value.length === 0) {
				mergely.lhs("");
				update_mergely_user_setting(kadai_filename_elem.options[kadai_filename_elem.selectedIndex].textContent);
				document.getElementById("download_filename").placeholder = "";
				set_preview_button_visible(false);
			} else {
				// プレビューボタンの描画
				set_preview_button_visible(true);
				// プログラムのデコード
				const decoded = add_indent_to_emply_line(decodeURIComponent(escape(atob(kadai_filename_elem.value))));
				// エディタ（左側）にコードの貼り付け
				mergely.lhs(decoded);
				// 課題ファイル名を取得
				const kadai_filename = kadai_filename_elem.options[kadai_filename_elem.selectedIndex].textContent;
				// 課題ファイル名(引数のもの)を与えてmergelyのコピー禁止、背景色を変更
				update_mergely_user_setting(kadai_filename);
				// ダウンロードファイル名のplacefolderを更新
				document.getElementById("download_filename").placeholder = kadai_filename;
				// localStorageから保存してあるコードを取得してエディタ（右側）に貼り付け
				const txt = localStorage.getItem(kadai_filename);
				if (txt !== null) {
					mergely.rhs(txt);
				}

				// 課題のクエスト一覧をselect要素に追加する
				Object.entries(kadai_quests[kadai_filename]).forEach(([filename, encoded_txt], i) => {
					kadai_quest_elem.appendChild([
						document.createElement("option"),
						e => e.value = encoded_txt,
						e => e.textContent = filename,
					].a2e());
				})
				// 課題のクエストが選ばれたとき
				kadai_quest_elem.addEventListener("change", e => {
					// 選択が解除されたとき
					if (kadai_quest_elem.value.length === 0) {
						// 課題ファイルの方が選択されたときを実行する、結果的にエディタ（左側）がプログラムに戻る）
						kadai_filename_elem.dispatchEvent(new Event("change"));
						return;
					}
					// クエストが選択されたとき、クエスト文をデコード
					const decoded = decodeURIComponent(escape(atob(kadai_quest_elem.value)));
					// エディタ（左側）に貼り付け
					mergely.lhs(decoded);
					// mergelyのコピー禁止、背景色を変更
					update_mergely_user_setting(kadai_quest_elem.options[kadai_quest_elem.selectedIndex].textContent);
				});
			}
		});

		// mergelyのエディタでは改行時に自動インデントが働き、前の行のインデントが引き継がれます。
		// 一方、VS Codeのフォーマッターで整形されたサンプルコードでは、行末のスペースが削除されるため、何もない行は\nだけになります。
		// その結果、ユーザーが書いたコードとサンプルコードの間に不要な差分が表示されてしまいます。
		// 差分を無視する方法として、mergelyでホワイトスペースを無視する設定もありますが、たとえば < /h1> のように不要なスペースがあっても差分が検出されなくなってしまいます。
		// そこで、mergelyはスペースを含めて差分を判定する設定にし、フォーマッターが削除したインデントだけの行を復元するコードを追加しました。
		const add_indent_to_emply_line = (text) => {
			const cr = "\r\n";
			text = text.replace(/\t/g, "  ");
			const get_indent = (text) => {
				const match = text.match(/^ */);
				return match ? match[0].length : 0;
			}
			const lines = text.split(cr);
			let ret = lines[0];
			let indent = get_indent(lines[0]);
			for (let l = 1; l < lines.length; l += 1) {
				if (lines[l].length === 0) {
					ret += cr + " ".repeat(indent);
				} else {
					ret += cr + lines[l];
					indent = get_indent(lines[l]);
				}
			}
			return ret;
		};


		// download ボタン
		document.getElementById("download_button").addEventListener("click", e => {
			const kadai_filename = kadai_filename_elem.options[kadai_filename_elem.selectedIndex].textContent;
			const blob = new Blob([mergely.cm("rhs").getValue()], { type: "text/html" });
			const link = document.createElement("a");
			link.href = URL.createObjectURL(blob);
			const filename = document.getElementById("download_filename");
			link.download = filename.value === "" ? filename.placeholder : filename.value;
			link.click();
			setTimeout(() => {
				URL.revokeObjectURL(link.href);
			}, 100);
		});

		// スクリーンに送る
		import { CommClient } from "./libs/CommClient.mjs";
		await CommClient.init(`html_gallery_client_${Date.now()}`, {
			server_cmd: msg => {
				CommClient.send({ cmd: "set_type", type: "controller" });
			},
		})
		document.getElementById("submit_to_screen").addEventListener("click", e => {
			if (confirm("HTMLの表示をスクリーンに送信します。よろしいですか？")) {
				CommClient.send({ to_id: "cameras", cmd: "text", data: mergely.cm("rhs").getValue() });
			}
		});

		// html文字をrenderしてポップアップで表示する。
		// renderにはhtml2canvas, popupにはlightbox2を使用する。
		const preview = async (html_string) => {
			const div = document.createElement("div");
			div.innerHTML = html_string.trim();
			div.style.position = "absolute";
			div.style.zIndex = -1;
			document.body.appendChild(div);

			const canvas = await html2canvas(div, { windowWidth: window.innerWidth * 0.8 });
			div.remove();

			const link = document.getElementById("lightbox2_popup");
			link.href = canvas.toDataURL("image/png");
			link.click();
		};

		// checkbox付きのdropdownlist
		tippy('#menu-btn', {
			content: document.getElementById('menu-content'),
			allowHTML: true,
			interactive: true,
			trigger: 'click',
			placement: 'bottom-start',
			arrow: false,
			offset: [0, 0],
			onMount(instance) {
				document.getElementById('menu-content').style.display = "block";
			},
			onHide(instance) {
				document.getElementById('menu-content').style.display = "none";
			},
		});

		// footerの最小化ボタン
		const footer_elem = document.getElementById("footer");
		const footer_toggle_elem = document.getElementById("footer-toggle");
		footer_toggle_elem.addEventListener("click", e => {
			const attrs = [
				["縮小", "30vh", "🔽"],
				["最大化", "5vh", "🔼"],
			];
			const name = footer_toggle_elem.title;
			const idx = 1 - attrs.findIndex(e => e[0] === name);

			footer_elem.style.height = attrs[idx][1];
			footer_toggle_elem.textContent = attrs[idx][2];
			footer_toggle_elem.title = attrs[idx][0];
		});
		footer_elem.addEventListener("transitionend", e => {
			if (e.propertyName === "height") {
				mergely.resize();
			}
		});

		// mergelyの左側を一時的に最小化するボタン
		const build_mergely_collapseLeft = () => {
			const left_panel = document.querySelectorAll(".CodeMirror")[0];
			left_panel.style.position = "relative";
			left_panel.style.transition = "width 0.5s ease";
			const toggle_btn = [
				document.createElement("button"),
				e => e.textContent = "🔽",
				e => e.classList.add("icon-button"),
				e => e.style.position = "absolute",
				e => e.style.display = "inline-block",
				e => e.style.top = "2px",
				e => e.style.right = "0px",
				e => e.style.transform = "translateX(-50%) rotate(90deg)",
				e => e.addEventListener("click", e => {
					toggle();
				}),
			].a2e();
			left_panel.appendChild(toggle_btn);

			const toggle = () => {
				const w = ["100%", "5%"];
				const cur = left_panel.style.width || w[0];

				left_panel.style.width = cur === w[0] ? w[1] : w[0];
				if (left_panel.style.width === w[0]) {
					toggle_btn.style.transform = "translateX(-50%) rotate(90deg)";
				} else {
					toggle_btn.style.transform = "translateX(-50%) rotate(-90deg)";
				}
			}
		}
		build_mergely_collapseLeft();



		// 初期の説明ダイアログ
		const show_instruction = async () => {
			// await Swal.fire({
			//   text: "任意課題まで含めてすべての改造を行うと、このようになります。",
			//   imageUrl: "kadai_imgs/js_08_invader.gif",
			// });

			await Swal.fire("まず課題ファイルを選択し、左のプログラムを右に書き写してください。これはコピーはできません。");
			await Swal.fire("次に、改造要求(課題選択の横にあります)を1つずつ選んで、プログラムを改造していってください。");
			await Swal.fire("改造要求にかかれているプログラムは、コピーできます。")

			await Swal.fire("改造が完了したら「課題チェック」、OKなら右上のdownloadボタンでダウンロードしておいてください。");
			await Swal.fire("すべての課題のチェックが終わったら、ダウンロードしたファイルをClassroomで提出してください。");

			// await Swal.fire("すべての改造を施したhtmlファイルをダウンロードして、Classroomで提出してください。");
		}
		document.getElementById("instruction").addEventListener("click", e => show_instruction());
		if (html_params.create_encoded_html === undefined) {
			// show_instruction();
		}

		// モデル化と要求開発で、JavaScript演習を行うために、
		// プレビューはきれいに動作しない、スクリーンに送るは必要ないため
		// カットする。
		// const style_elem = document.querySelector("style");
		// ["final_preview_button", "submit_to_screen"].forEach(e => {
		//   style_elem.appendChild(document.createTextNode(`
		//       #${e} { display: none !important; }
		//     `))
		// });

	</script>
</body>
